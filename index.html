<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hello World</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f1e8;
        color: #18212f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 2rem;
      }

      main {
        width: min(100%, 42rem);
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(3rem, 10vw, 7rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        margin: 1.5rem auto 0;
        max-width: 34rem;
        font-size: clamp(1.1rem, 3vw, 1.35rem);
        line-height: 1.55;
        color: #4b5563;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #121826;
          color: #f8fafc;
        }

        p {
          color: #cbd5e1;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello, world.</h1>
      <p>This GitHub Pages site is live from a simple static HTML page.</p>
    </main>
  </body>
</html>
