<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Alex Lacker Games</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="menu-page">
    <main class="menu-shell">
      <header class="menu-header">
        <h1>Games</h1>
        <p>Pick a game.</p>
      </header>

      <nav class="game-grid" aria-label="Game menu">
        <a class="game-tile" href="games/tetris/" aria-label="Play Tetris">
          <span class="game-icon tetris-icon" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </span>
          <span class="game-name">Tetris</span>
        </a>

        <a class="game-tile" href="games/stink-eye/" aria-label="Play Stink Eye">
          <span class="game-icon stink-eye-icon" aria-hidden="true">
            <span class="eye-mark"></span>
          </span>
          <span class="game-name">Stink Eye</span>
        </a>
      </nav>
    </main>
  </body>
</html>
